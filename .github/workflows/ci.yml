name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/
      - run: npx vitest run
      - run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
