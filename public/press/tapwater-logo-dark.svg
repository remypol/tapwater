<svg xmlns="http://www.w3.org/2000/svg" width="220" height="52" viewBox="0 0 220 52" fill="none">
  <!-- Drop lens icon (dark variant: for dark backgrounds, light colours) -->
  <!-- Water drop shape -->
  <path d="M24 4C24 4 10 20 10 30C10 37.732 16.268 44 24 44C31.732 44 38 37.732 38 30C38 20 24 4 24 4Z" fill="#67b8d6"/>
  <!-- Magnifying glass circle (lens) -->
  <circle cx="24" cy="28" r="9" fill="none" stroke="#a3dced" stroke-width="2.5" opacity="0.9"/>
  <!-- Lens highlight -->
  <circle cx="21" cy="25" r="2.5" fill="white" opacity="0.4"/>
  <!-- Magnifying glass handle -->
  <line x1="30.5" y1="34.5" x2="36" y2="40" stroke="#67b8d6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Text: "tap" in white, "water" in brand blue -->
  <text x="54" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#ffffff">tap</text>
  <text x="85" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#67b8d6">water</text>
  <!-- .uk sub-label -->
  <text x="55" y="41" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" letter-spacing="3" fill="#67b8d6" opacity="0.6">.uk</text>
</svg>
